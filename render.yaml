services:
  - type: web
    name: relay-med-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: GEMINI_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: "gemini"
      - key: CORS_ORIGINS
        value: "*"
